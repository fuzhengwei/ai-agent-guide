# ========== LLM 代理 - API Key 轮询负载均衡 ==========
# 使用 map + $request_id 实现多 Key 轮询
# 每次请求随机分配一个 Key，实现简单的负载均衡

map $request_id $llm_api_key {
    default "sk-Jf7Ly1k9EccTEHy6rbMLFjgfWLFeDBpwSdIs3MPc2UARHfrK";
    # 如需添加更多 Key 实现轮询，取消下方注释并填入 Key
    # "~^.{32}" "sk-你的第二个API Key";
    # "~^.{64}" "sk-你的第三个API Key";
}

# 上游 LLM 服务
upstream llm_backend {
    server apihub.agnes-ai.com:443;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name ai-agent-guide.xiaofuge.cn;
    rewrite ^(.*) https://$server_name$1 permanent;
}
 
# HTTPS 主服务
server {
    listen       443 ssl;
    server_name  ai-agent-guide.xiaofuge.cn;
 
    ssl_certificate      /etc/nginx/ssl/_.xiaofuge.cn.pem;
    ssl_certificate_key  /etc/nginx/ssl/_.xiaofuge.cn.key;
 
    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;
 
    ssl_ciphers  HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;
 
    root /usr/share/nginx/html/ai-agent-guide.xiaofuge.cn;
    index index.html;
 
    # 字符编码
    charset utf-8;

    # ========== LLM API 代理 ==========
    # 代理路径：/api/chat/v1/chat/completions → https://apihub.agnes-ai.com/v1/chat/completions
    # 前端请求 /api/chat/v1/chat/completions，Nginx 自动附加 API Key 并转发

    location /api/chat/v1/ {
        proxy_pass https://llm_backend/v1/;
        proxy_http_version 1.1;

        # 设置代理请求头
        proxy_set_header Host apihub.agnes-ai.com;
        proxy_set_header Authorization "Bearer $llm_api_key";
        proxy_set_header Content-Type "application/json";

        # SSL 验证
        proxy_ssl_server_name on;
        proxy_ssl_name apihub.agnes-ai.com;

        # SSE 流式响应支持
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # CORS 头（同源其实不需要，但防御性添加）
        add_header Access-Control-Allow-Origin "https://ai-agent-guide.xiaofuge.cn" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # 处理 OPTIONS 预检请求
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://ai-agent-guide.xiaofuge.cn" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
 
    # ========== version.js：不缓存，确保版本检测代码本身是最新的 ==========
    location = /js/version.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========== HTML 文件：不缓存，每次都校验 ==========
    # 确保用户始终拿到最新的 index.html 和章节页面
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========== version.json：不缓存，用于版本检测 ==========
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Access-Control-Allow-Origin "*";
    }

    # ========== CSS/JS 静态资源：协商缓存 ==========
    # 不使用强缓存（expires 7d），改为 must-revalidate
    # 配合 ?v= 版本号，文件不变时走 304 缓存，文件更新后立即生效
    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ========== 二维码图片：CORS 允许 Canvas 绘制 ==========
    location /assets/QR-code.png {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, no-transform";
        expires 7d;
    }

    # ========== 题库 JSON：不缓存，题目更新需立即生效 ==========
    # data/*.json 含题库等动态内容，不能走强缓存，否则用户拿不到新题
    location /data/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 其他静态资源（图片/字体等）：可强缓存，内容很少变
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
 
    # 其余 JSON（非 data 目录）：协商缓存
    location ~* \.json$ {
        add_header Cache-Control "public, must-revalidate";
        expires 1h;
    }
 
    # XML 文件（sitemap）
    location ~* \.xml$ {
        types {
            application/xml xml;
        }
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
 
    # chapters 目录
    location /chapters/ {
        try_files $uri $uri/ /index.html;
    }
 
    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
